  <!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<style>
#startBtn {
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 20px;
  font-size: 18px;
  z-index: 999;
}
</style>
</head>

<body>

<button id="startBtn">INICIAR VR</button>

<a-scene fog="type: exponential; color: #111; density: 0.02">

  <a-assets>
    <!-- MONSTRUO 3D -->
    <a-asset-item id="monsterModel"
      src="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@main/2.0/Monster/glTF-Binary/Monster.glb">
    </a-asset-item>
  </a-assets>

  <!-- PLAYER -->
  <a-entity id="player" position="0 1.7 0">

    <a-camera id="cam" look-controls="touchEnabled: true">
      <a-light type="spot" intensity="6" angle="45" distance="60"></a-light>
    </a-camera>

  </a-entity>

  <!-- MUNDO -->
  <a-plane rotation="-90 0 0" width="200" height="200" color="#2a2a2a"></a-plane>
  <a-sky color="#111"></a-sky>
  <a-light type="ambient" intensity="0.5"></a-light>

  <!-- 👻 MONSTRUO REAL -->
  <a-entity id="monster"
    gltf-model="#monsterModel"
    scale="0.8 0.8 0.8"
    position="0 0 -20">
  </a-entity>

</a-scene>

<script>
let player = document.querySelector("#player");
let cam = document.querySelector("#cam");
let monster = document.querySelector("#monster");

let started = false;
let moving = false;

// ACTIVAR
document.getElementById("startBtn").onclick = async () => {
  document.getElementById("startBtn").style.display = "none";

  if (typeof DeviceMotionEvent !== "undefined" &&
      typeof DeviceMotionEvent.requestPermission === "function") {
    try {
      await DeviceMotionEvent.requestPermission();
    } catch (e) {}
  }

  started = true;
};

// 🚶 MOVIMIENTO SUAVE
function move() {
  if (!started || !moving) return;

  let pos = player.getAttribute("position");

  let direction = new THREE.Vector3();
  cam.object3D.getWorldDirection(direction);

  pos.x += direction.x * 0.15;
  pos.z += direction.z * 0.15;

  player.setAttribute("position", pos);

  requestAnimationFrame(move);
}

// CONTROLES
document.body.addEventListener("touchstart", () => {
  if (!started) return;
  moving = true;
  move();
});

document.body.addEventListener("touchend", () => {
  moving = false;
});

// 👁️ MONSTRUO TE SIGUE
setInterval(() => {
  let p = player.getAttribute("position");
  let m = monster.getAttribute("position");

  let dx = p.x - m.x;
  let dz = p.z - m.z;

  m.x += dx * 0.02;
  m.z += dz * 0.02;

  monster.setAttribute("position", m);
}, 100);

// 👻 APARECE DETRÁS
setInterval(() => {
  let p = player.getAttribute("position");
  let rot = player.getAttribute("rotation").y;
  let rad = rot * (Math.PI / 180);

  let x = p.x + Math.sin(rad) * 6;
  let z = p.z + Math.cos(rad) * 6;

  if (Math.random() < 0.4) {
    monster.setAttribute("position", `${x} 0 ${z}`);
  }
}, 5000);

// 💀 GAME OVER
setInterval(() => {
  let p = player.getAttribute("position");
  let m = monster.getAttribute("position");

  let dist = Math.sqrt((p.x - m.x)**2 + (p.z - m.z)**2);

  if (dist < 1.5) {
    alert("💀 TE ATRAPÓ 💀");
    location.reload();
  }
}, 400);

</script>

</body>
</html>
