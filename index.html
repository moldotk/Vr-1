<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Juego AR Handtracking Android</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>
    <div id="info">Busca el botón "Start AR" abajo</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';

        let scene, camera, renderer, object;
        let hand1, hand2;
        let handModelFactory;

        // Variables para la lógica de agarre
        let isGrabbing = false;

        init();
        animate();

        function init() {
            // --- SCENE CONFIG ---
            scene = new THREE.Scene();
            
            // Importante: No establecer scene.background para que se vea la cámara

            // --- CAMERA CONFIG ---
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 20);

            // --- RENDERER CONFIG ---
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true; // Habilitar WebXR
            document.body.appendChild(renderer.domElement);

            // --- AÑADIR BOTÓN AR ESPECÍFICO PARA ANDROID ---
            // Solicitamos la característica opcional 'hand-tracking'
            document.body.appendChild(ARButton.createButton(renderer, {
                requiredFeatures: ['hit-test'], // hit-test suele ayudar a estabilizar la sesión AR en Android
                optionalFeatures: ['hand-tracking'] 
            }));

            // --- ILUMINACIÓN (Crucial para el "super detalle") ---
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.0); // Luz base suave
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 2.0);
            directionalLight.position.set(1, 2, 1);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            // --- OBJETO DETALLADO (Un TorusKnot PBR) ---
            const geometry = new THREE.TorusKnotGeometry(0.06, 0.02, 150, 20);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0xff3300, 
                metalness: 0.9, 
                roughness: 0.1,
                emissive: 0x220000
            });
            object = new THREE.Mesh(geometry, material);
            object.position.set(0, 0, -0.3); // Posición inicial frente a la cámara
            object.castShadow = true;
            scene.add(object);

            // --- CONFIGURACIÓN DE MODELOS DE MANOS ---
            handModelFactory = new XRHandModelFactory();

            // Mano 1
            hand1 = renderer.xr.getHand(0);
            hand1.add(handModelFactory.createHandModel(hand1, "mesh"));
            scene.add(hand1);

            // Mano 2
            hand2 = renderer.xr.getHand(1);
            hand2.add(handModelFactory.createHandModel(hand2, "mesh"));
            scene.add(hand2);

            // Eventos de redimensionado
            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            // Usar setAnimationLoop es obligatorio para WebXR
            renderer.setAnimationLoop(render);
        }

        function render() {
            // Rotación suave del objeto si no está siendo agarrado
            if (!isGrabbing) {
                object.rotation.x += 0.01;
                object.rotation.y += 0.01;
            }

            // --- LÓGICA EXPERIMENTAL DE AGARRE (Pinche) ---
            // En Android Chrome, obtener las articulaciones (joints) es experimental
            checkHandInteraction(hand1);
            checkHandInteraction(hand2);

            renderer.render(scene, camera);
        }

        function checkHandInteraction(hand) {
            // Comprobamos si la sesión XR está activa y si tenemos acceso a las articulaciones
            const session = renderer.xr.getSession();
            if (session && hand.joints) {
                // Obtenemos las puntas del índice y pulgar (puntos 9 y 4 en el estándar)
                const indexTip = hand.joints['index-finger-tip'];
                const thumbTip = hand.joints['thumb-tip'];

                // Si ambas articulaciones están siendo rastreadas
                if (indexTip && thumbTip && indexTip.visible && thumbTip.visible) {
                    const distance = indexTip.position.distanceTo(thumbTip.position);

                    // Si la distancia es menor a 2.5cm, consideramos que hay pellizco
                    if (distance < 0.025) {
                        const distToObject = indexTip.position.distanceTo(object.position);

                        // Si la mano está cerca del objeto, lo movemos
                        if (distToObject < 0.1) {
                            object.position.copy(indexTip.position);
                            isGrabbing = true;
                            object.material.emissive.setHex(0x00ff00); // Feedback visual: Verde
                        }
                    } else {
                        // Si se suelta el pellizco asociado a este objeto
                        if(isGrabbing && indexTip.position.distanceTo(object.position) < 0.05) {
                            isGrabbing = false;
                            object.material.emissive.setHex(0x220000); // Feedback visual: Normal
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
