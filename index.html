<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Passthrough Plano</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <a-scene vr-mode-ui="enabled: true">
      <a-assets>
        <!-- Cargamos el video de la cámara -->
        <video id="webcam" autoplay playsinline crossorigin="anonymous"></video>
      </a-assets>

      <!-- El "Sky" ahora es tu cámara. 
           Usamos un radio grande para que se sienta plano y no esférico -->
      <a-sky src="#webcam" rotation="0 -90 0"></a-sky>

      <!-- Aquí puedes añadir tus objetos de juego en VR -->
      <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>
      <a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>
      
      <a-entity camera look-controls position="0 1.6 0"></a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#webcam');

      // Configuración para cámara trasera sin distorsión
      const constraints = {
        video: {
          facingMode: 'environment',
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        },
        audio: false
      };

      navigator.mediaDevices.getUserMedia(constraints)
        .then(stream => {
          video.srcObject = stream;
          video.play();
        })
        .catch(err => {
          alert("Error: Asegúrate de usar HTTPS y dar permisos de cámara.");
          console.error(err);
        });
    </script>
  </body>
</html>
