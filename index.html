<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Passthrough Anclado Total</title>
    <!-- Cargamos A-Frame y AR.js -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <!-- 
      Configuramos la escena para que sea de tipo AR.
      sourceType: webcam -> Fuerza el uso de la cámara del teléfono como fondo real.
    -->
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;" 
      vr-mode-ui="enabled: true">

      <!-- 
        Los objetos se anclan al "mundo". 
        En AR.js, si no usas marcadores, los objetos se quedan en su posición GPS o local.
      -->
      <a-marker-camera preset="hiro">
          <!-- Si quieres usar un marcador impreso (Hiro), pon los objetos aquí -->
      </a-marker-camera>

      <!-- Si quieres que estén anclados al ESPACIO (sin marcador) -->
      <a-entity id="objetos-anclados">
          <a-box position="0 0.5 -5" material="color: #4CC3D9; opacity: 0.9;" shadow></a-box>
          <a-sphere position="2 1 -7" radius="1" color="#EF2D5E"></a-sphere>
          <a-torus-knot position="-2 1.5 -6" radius="0.5" tube="0.15" color="#FFC65D"></a-torus-knot>
      </a-entity>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Forzamos que la escena no intente usar el modo WebXR nativo que da el cuadro negro
      window.addEventListener('load', () => {
          const scene = document.querySelector('a-scene');
          scene.addEventListener('enter-vr', () => {
              if (scene.is('ar-mode')) {
                  // Ajustes extra si entra en AR
                  console.log("Modo AR Activo");
              }
          });
      });
    </script>
  </body>
</html>
