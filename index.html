<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Passthrough Reparado</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      /* Evita que cualquier elemento de la interfaz tape la cámara */
      .a-canvas { z-index: 0; }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden; background-color: #000;">

    <a-scene vr-mode-ui="enabled: true" renderer="antialias: true; alpha: true;">
      
      <a-assets>
        <video id="webcam" autoplay playsinline crossorigin="anonymous" loop="true"></video>
      </a-assets>

      <a-sky src="#webcam" material="shader: flat; fog: false" radius="100" rotation="0 -90 0"></a-sky>

      <a-entity camera look-controls position="0 1.6 0"></a-entity>

      <a-entity id="mundo-real">
        <a-box position="0 1 -3" material="color: #4CC3D9; opacity: 0.8;"></a-box>
        <a-sphere position="3 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>
        <a-cylinder position="-3 0.75 -4" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
      </a-entity>

      <a-light type="ambient" intensity="1"></a-light>
    </a-scene>

    <script>
      const video = document.querySelector('#webcam');
      const scene = document.querySelector('a-scene');

      // 1. Activar cámara con la mejor resolución posible
      navigator.mediaDevices.getUserMedia({
        video: { 
          facingMode: 'environment',
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      })
      .then(stream => {
        video.srcObject = stream;
        video.play().catch(e => console.log("Esperando interacción..."));
      })
      .catch(err => alert("Error: Necesitas HTTPS o permisos de cámara."));

      // 2. REPARACIÓN DEL CUADRO NEGRO:
      // Cuando el usuario entra en modo VR, el video suele pausarse. 
      // Este evento lo despierta a la fuerza.
      scene.addEventListener('enter-vr', () => {
        console.log("Modo VR iniciado - Despertando cámara");
        // Forzamos al video a reproducirse después de un micro-retraso
        setTimeout(() => {
          video.play();
          // Ajuste de brillo para que no se vea oscuro
          document.querySelector('a-sky').setAttribute('material', 'exposure', 2);
        }, 1000);
      });

      // 3. Toque para móvil: Si se queda negro, un toque en la pantalla lo activa
      document.body.addEventListener('click', () => {
        video.play();
      });
    </script>
  </body>
</html>
