<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Native Passthrough VR (No Distortion)</title>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: sans-serif; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: rgba(0,0,0,0.9); z-index: 100;
            color: white; text-align: center; padding: 20px;
        }
        button {
            padding: 20px 40px; font-size: 1.5rem; background: #00ff88;
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 20px rgba(0,255,136,0.5);
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>PASSTHROUGH NATIVO VR</h1>
        <p>Acepta permisos y coloca el móvil en el visor.<br>Se intentará usar la cámara nativa de fondo.</p>
        <button id="btn-start">INICIAR (CÁMARA TOTAL)</button>
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';

        let scene, camera, renderer, crystal;

        function init() {
            scene = new THREE.Scene();
            // IMPORTANTE: Escena transparente
            scene.background = null; 

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 100);

            // RENDERER CON ALPHA ACTIVADO (CRUCIAL PARA PASSTHROUGH)
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // --- ILUMINACIÓN ---
            scene.add(new THREE.AmbientLight(0xffffff, 1));
            const pointLight = new THREE.PointLight(0x00ff88, 15);
            pointLight.position.set(0, 3, 2);
            scene.add(pointLight);

            // --- ELEMENTOS DE REFERENCIA PARA CAMINAR ---
            const grid = new THREE.GridHelper(50, 100, 0x00ff88, 0x222222);
            grid.position.y = -0.01;
            scene.add(grid);

            // Columnas flotantes sólidas
            const boxGeo = new THREE.BoxGeometry(0.2, 1, 0.2);
            const boxMat = new THREE.MeshStandardMaterial({ color: 0x0088ff, metalness: 0.8, roughness: 0.1 });
            for(let i=0; i<15; i++) {
                const box = new THREE.Mesh(boxGeo, boxMat);
                box.position.set(Math.random()*10-5, 0.5, Math.random()*-15);
                scene.add(box);
            }

            // --- CRISTAL INTERACTIVO ---
            const gemaGeo = new THREE.OctahedronGeometry(0.15, 0);
            const gemaMat = new THREE.MeshStandardMaterial({ 
                color: 0x00ff88, metalness: 1, roughness: 0, 
                emissive: 0x00ff88, emissiveIntensity: 0.5 
            });
            crystal = new THREE.Mesh(gemaGeo, gemaMat);
            crystal.position.set(0, 1.5, -1);
            scene.add(crystal);

            // --- MANOS CON OCLUSIÓN ---
            const handFactory = new XRHandModelFactory();
            for(let i=0; i<2; i++) {
                const hand = renderer.xr.getHand(i);
                hand.add(handFactory.createHandModel(hand, "mesh"));
                // Material invisible para oclusión
                hand.traverse(c => { if(c.isMesh) c.material = new THREE.MeshBasicMaterial({colorWrite: false}); });
                scene.add(hand);
            }

            renderer.setAnimationLoop(render);
        }

        function render(time) {
            crystal.rotation.y = time / 1000;
            renderer.render(scene, camera);
        }

        // Lógica de inicio
        document.getElementById('btn-start').onclick = async () => {
            try {
                // Iniciar Three.js
                init();

                // SOLICITAR SESIÓN VR CON PASSTHROUGH NATIVO
                // Intentamos usar 'immersive-vr' solicitando características opcionales de AR
                // para forzar la transparencia del fondo si el navegador lo soporta.
                const session = await navigator.xr.requestSession('immersive-vr', {
                    optionalFeatures: ['local-floor', 'hand-tracking', 'layers']
                });

                // Si la sesión se inicia, forzamos que Three.js no dibuje fondo
                renderer.xr.setSession(session);
                document.getElementById('overlay').style.display = 'none';

            } catch (e) {
                console.error(e);
                alert("Error al iniciar WebXR. Asegúrate de usar HTTPS y dar permisos.");
            }
        };
    </script>
</body>
</html>
