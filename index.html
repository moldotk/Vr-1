<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<a-scene embedded>

<!-- manos -->
<a-entity id="hand1" geometry="primitive: sphere; radius:0.12" material="color:red"></a-entity>
<a-entity id="hand2" geometry="primitive: sphere; radius:0.12" material="color:blue"></a-entity>

</a-scene>

<script>
const video=document.getElementById("video");
const scene=document.querySelector("a-scene");

let hand1=document.getElementById("hand1");
let hand2=document.getElementById("hand2");

let grabbedObj=null;
let lastPos=null;

//////////////////////
// OBJETOS
//////////////////////

for(let i=0;i<8;i++){
let obj=document.createElement("a-box");
obj.setAttribute("position",`${Math.random()*4-2} ${Math.random()*2} -3`);
obj.setAttribute("color","#00e5ff");
scene.appendChild(obj);
}

//////////////////////
// DETECTAR PUÑO
//////////////////////

function isClosedHand(lm){
let tip=lm[8];
let base=lm[5];
return (tip.y > base.y); // dedo doblado
}

//////////////////////
// HAND TRACKING
//////////////////////

const hands=new Hands({
locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
maxNumHands:2,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
});

hands.onResults(results=>{

let handsData=results.multiHandLandmarks;

if(!handsData) return;

handsData.forEach((lm,index)=>{

let tip=lm[8];

let x=(tip.x-0.5)*4;
let y=(0.5-tip.y)*3;

let hand=index===0?hand1:hand2;
hand.setAttribute("position",`${x} ${y} -2`);

let closed=isClosedHand(lm);

//////////////////////
// AGARRAR
//////////////////////

if(closed){

if(!grabbedObj){

document.querySelectorAll("a-box").forEach(obj=>{
let pos=obj.getAttribute("position");
let dx=x-pos.x;
let dy=y-pos.y;
let dz=(-2)-pos.z;
let dist=Math.sqrt(dx*dx+dy*dy+dz*dz);

if(dist<0.5){
grabbedObj=obj;
}
});

}

if(grabbedObj){
grabbedObj.setAttribute("position",`${x} ${y} -2`);

if(lastPos){
let vx=x-lastPos.x;
let vy=y-lastPos.y;

// guardar velocidad
grabbedObj.userData={vx,vy};
}

lastPos={x,y};
}

}else{

//////////////////////
// SOLTAR / LANZAR
//////////////////////

if(grabbedObj){

let data=grabbedObj.userData||{vx:0,vy:0};

let pos=grabbedObj.getAttribute("position");

grabbedObj.setAttribute("animation__move",{
property:"position",
to:`${pos.x+data.vx*10} ${pos.y+data.vy*10} -5`,
dur:500
});

grabbedObj=null;
lastPos=null;
}

}

});

});

//////////////////////
// CAMARA
//////////////////////

const camera=new Camera(video,{
onFrame:async()=>{
await hands.send({image:video});
},
width:640,
height:480
});

camera.start();
</script>

</body>
</html>
