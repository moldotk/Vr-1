<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>High-End WebXR Hand Interaction</title>
    <style>
        body { margin: 0; background: #000; }
        #instructions { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #555; font-family: sans-serif; pointer-events: none; }
    </style>
</head>
<body>
    <div id="instructions">Usa tus manos para pellizcar y mover el cubo</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';

        let scene, camera, renderer, cube;
        let hands = [];
        const handModelFactory = new XRHandModelFactory();

        // Variables para la lógica de agarre
        let grabbedObject = null;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 10);
            camera.position.set(0, 1.6, 0.5);

            // --- ILUMINACIÓN DETALLADA ---
            const ambient = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambient);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
            directionalLight.position.set(1, 2, 1);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            // --- RENDERER PRO ---
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // --- OBJETO INTERACTIVO (Detalle PBR) ---
            const geometry = new THREE.BoxGeometry(0.15, 0.15, 0.15);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x0088ff, 
                metalness: 0.7, 
                roughness: 0.2,
                emissive: 0x001133
            });
            cube = new THREE.Mesh(geometry, material);
            cube.position.set(0, 1.2, -0.4);
            cube.castShadow = true;
            scene.add(cube);

            // --- CONFIGURACIÓN DE MANOS ---
            for (let i = 0; i < 2; i++) {
                const hand = renderer.xr.getHand(i);
                hand.add(handModelFactory.createHandModel(hand, "mesh"));
                
                // Eventos de pellizco (Pinch)
                hand.addEventListener('pinchend', () => { grabbedObject = null; });
                
                scene.add(hand);
                hands.push({ hand, inputSource: null });
            }

            window.addEventListener('resize', onWindowResize);
        }

        function checkInteractions() {
            // Recorremos ambas manos para detectar el pellizco
            const session = renderer.xr.getSession();
            if (!session) return;

            for (const handObj of hands) {
                const hand = handObj.hand;
                
                // El "index-finger-tip" es el punto 9 en el estándar WebXR
                const indexTip = hand.joints['index-finger-tip'];
                const thumbTip = hand.joints['thumb-tip'];

                if (indexTip && thumbTip) {
                    const distance = indexTip.position.distanceTo(thumbTip.position);

                    // Si la distancia es muy corta (pellizco)
                    if (distance < 0.02) {
                        const distToCube = indexTip.position.distanceTo(cube.position);
                        
                        // Si la mano está cerca del cubo, lo "agarramos"
                        if (distToCube < 0.15) {
                            cube.position.copy(indexTip.position);
                            cube.material.emissive.setHex(0x00ff00); // Brillo verde al tocar
                        }
                    } else {
                        cube.material.emissive.setHex(0x001133);
                    }
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render() {
            checkInteractions();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
