<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reparación XR: Cámara + VR</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #gui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-align: center; }
        button { padding: 20px; font-size: 1.2rem; background: #00ff88; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        video { display: none; } /* Ocultamos el video crudo */
    </style>
</head>
<body>
    <div id="gui">
        <button id="start">REPARAR Y ACTIVAR VISOR</button>
    </div>
    <video id="video" autoplay playsinline></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';

        let scene, camera, renderer, crystal;
        const video = document.getElementById('video');

        async function setupCamera() {
            // Pedimos permiso para usar la cámara trasera
            const constraints = { video: { facingMode: 'environment' } };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            return new Promise(resolve => video.onloadedmetadata = resolve);
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 1. FONDO DE CÁMARA (Para que no se vea negro)
            const videoTexture = new THREE.VideoTexture(video);
            const backgroundGeo = new THREE.SphereGeometry(10, 32, 32);
            const backgroundMat = new THREE.MeshBasicMaterial({ map: videoTexture, side: THREE.BackSide });
            const backgroundMesh = new THREE.Mesh(backgroundGeo, backgroundMat);
            scene.add(backgroundMesh);

            // 2. LUZ Y CRISTAL DETALLADO (No más palitos)
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const pointLight = new THREE.PointLight(0x00ff88, 2);
            pointLight.position.set(0, 2, 1);
            scene.add(pointLight);

            const geo = new THREE.IcosahedronGeometry(0.12, 0); // Sólido
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x00ff88, 
                metalness: 0.9, 
                roughness: 0.1,
                emissive: 0x004422
            });
            crystal = new THREE.Mesh(geo, mat);
            crystal.position.set(0, 1.4, -0.6);
            scene.add(crystal);

            // 3. MANOS
            const factory = new XRHandModelFactory();
            for(let i=0; i<2; i++) {
                const hand = renderer.xr.getHand(i);
                hand.add(factory.createHandModel(hand, "mesh"));
                // Las manos ocultan el cristal si pasan por delante
                hand.traverse(c => { if(c.isMesh) c.material = new THREE.MeshBasicMaterial({colorWrite:false}); });
                scene.add(hand);
            }

            renderer.setAnimationLoop(() => {
                crystal.rotation.y += 0.01;
                crystal.rotation.x += 0.005;
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start').onclick = async () => {
            try {
                await setupCamera(); // Paso 1: Encender cámara del Oppo
                init(); // Paso 2: Crear mundo 3D
                
                // Paso 3: Entrar en modo Visor Pantalla Dividida
                const session = await navigator.xr.requestSession('immersive-vr', {
                    optionalFeatures: ['hand-tracking', 'local-floor']
                });
                renderer.xr.setSession(session);
                document.getElementById('gui').style.display = 'none';
            } catch (e) {
                alert("Error: Asegúrate de usar HTTPS y dar permisos de cámara.");
                console.error(e);
            }
        };
    </script>
</body>
</html>
