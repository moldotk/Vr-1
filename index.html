<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VR Passthrough - Objetos Fijos</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene vr-mode-ui="enabled: true">
        
        <a-assets>
            <video id="webcam" autoplay playsinline crossorigin="anonymous"></video>
        </a-assets>

        <a-entity camera look-controls position="0 1.6 0">
            <a-video src="#webcam" 
                     width="32" height="18" 
                     position="0 0 -20" 
                     material="shader: flat; fog: false">
            </a-video>
        </a-entity>

        <a-entity id="mundo-virtual">
            <a-box position="0 1.5 -3" material="color: #4CC3D9; opacity: 0.8" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000"></a-box>
            
            <a-sphere position="-3 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>
            
            <a-cylinder position="3 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
            
            <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" visible="false"></a-plane>
        </a-entity>

        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="-1 2 1"></a-light>

    </a-scene>

    <script>
        const video = document.querySelector('#webcam');

        // Configuración de cámara
        navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'environment',
                width: { ideal: 1920 },
                height: { ideal: 1080 }
            }
        })
        .then(stream => {
            video.srcObject = stream;
            video.play();
        })
        .catch(err => {
            console.error("Error:", err);
            alert("Usa HTTPS para acceder a la cámara.");
        });

        // Forzar que el video no se pause al entrar en VR
        document.querySelector('a-scene').addEventListener('enter-vr', () => {
            setTimeout(() => { video.play(); }, 500);
        });
    </script>
</body>
</html>
