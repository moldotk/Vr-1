<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Visor VR Passthrough Fusion</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.7); z-index: 100;
        }
        button {
            padding: 20px 40px; font-size: 1.2rem; border-radius: 10px;
            border: none; background: #00ff88; color: black; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <button id="btn-start">INICIAR MODO VISOR (SBS)</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';

        let scene, camera, renderer, object;
        let hand1, hand2;

        init();

        function init() {
            scene = new THREE.Scene();

            // Cámara inicial
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            // CONFIGURACIÓN CLAVE PARA VISOR
            renderer.xr.enabled = true;
            // Forzamos que la salida sea estéreo si el dispositivo lo permite
            renderer.xr.cameraAutoUpdate = true; 

            document.body.appendChild(renderer.domElement);

            // Iluminación Neon
            const light = new THREE.PointLight(0x00ff88, 10);
            light.position.set(0, 2, 1);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.3));

            // Objeto Detallado
            const geo = new THREE.IcosahedronGeometry(0.1, 1);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x00ff88, 
                metalness: 0.9, 
                roughness: 0.1,
                wireframe: true 
            });
            object = new THREE.Mesh(geo, mat);
            object.position.set(0, 1.4, -0.5);
            scene.add(object);

            setupHands();

            const btn = document.getElementById('btn-start');
            btn.onclick = () => {
                // Solicitamos sesión VR pero con 'local-floor' para mantener estabilidad
                // En Android, esto activará la pantalla dividida si el navegador detecta un visor
                navigator.xr.requestSession('immersive-vr', {
                    optionalFeatures: ['hand-tracking', 'local-floor']
                }).then(onSessionStarted);
            };
        }

        function setupHands() {
            const factory = new XRHandModelFactory();
            [0, 1].forEach(i => {
                const hand = renderer.xr.getHand(i);
                hand.add(factory.createHandModel(hand, "mesh"));
                
                // Material invisible para oclusión
                hand.traverse(c => {
                    if (c.isMesh) c.material = new THREE.MeshBasicMaterial({ colorWrite: false });
                });
                
                scene.add(hand);
                if(i === 0) hand1 = hand; else hand2 = hand;
            });
        }

        function onSessionStarted(session) {
            renderer.xr.setSession(session);
            document.getElementById('overlay').style.display = 'none';
            
            // Si el modo VR tapa la cámara, forzamos transparencia (depende del firmware del Oppo)
            scene.background = null; 
        }

        function render(time) {
            object.rotation.y = time / 1000;
            
            // Lógica de agarre para manos en estéreo
            [hand1, hand2].forEach(h => {
                if(h && h.joints && h.joints['index-finger-tip']) {
                    const tip = h.joints['index-finger-tip'].position;
                    const thumb = h.joints['thumb-tip'].position;
                    if(tip.distanceTo(thumb) < 0.025 && tip.distanceTo(object.position) < 0.15) {
                        object.position.copy(tip);
                    }
                }
            });

            renderer.render(scene, camera);
        }

        renderer.setAnimationLoop(render);
    </script>
</body>
</html>
