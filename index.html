<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Passthrough Profesional</title>
    <!-- Cargamos A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
    </style>
</head>
<body>

    <a-scene 
        renderer="antialias: true; colorManagement: true;" 
        vr-mode-ui="enabled: true"
        loading-screen="dotsColor: white; backgroundColor: black">
        
        <a-assets>
            <!-- El video con playsinline para que no se abra en pantalla completa en móviles -->
            <video id="webcam" autoplay playsinline crossorigin="anonymous"></video>
        </a-assets>

        <!-- Cámara del Jugador -->
        <a-entity camera look-controls>
            <!-- 
                EL PLANO DE PASSTHROUGH:
                - Se coloca dentro de la cámara para que te siga a donde mires.
                - Position 0 0 -1 es justo frente a tus ojos.
                - El scale ajusta el tamaño para cubrir el campo de visión.
            -->
            <a-video src="#webcam" 
                     width="16" height="9" 
                     position="0 0 -5" 
                     scale="1.2 1.2 1.2">
            </a-video>
        </a-entity>

        <!-- OBJETOS DE PRUEBA (Para ver que el VR funciona sobre la cámara) -->
        <a-box position="-2 0.5 -3" rotation="0 45 0" color="#4CC3D9" shadow></a-box>
        <a-sphere position="0 1.25 -4" radius="1.25" color="#EF2D5E" shadow></a-sphere>
        <a-cylinder position="2 0.75 -3" radius="0.5" height="1.5" color="#FFC65D" shadow></a-cylinder>

        <!-- Iluminación básica -->
        <a-light type="ambient" color="#fff"></a-light>
        <a-light type="directional" color="#EEE" intensity="0.5" position="-1 1 2"></a-light>

    </a-scene>

    <script>
        const video = document.querySelector('#webcam');

        // Configuración de cámara de alta fidelidad
        async function setupCamera() {
            const constraints = {
                video: {
                    facingMode: 'environment', // Cámara trasera
                    width: { ideal: 1920 },    // Intentar Full HD
                    height: { ideal: 1080 }
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                // Forzamos al motor a entender que el video ya tiene dimensiones
                video.addEventListener('loadedmetadata', () => {
                    video.play();
                });
            } catch (err) {
                console.error("Error crítico de cámara:", err);
                alert("No se pudo acceder a la cámara. Revisa si estás en HTTPS.");
            }
        }

        // Iniciar cámara al cargar
        setupCamera();

        // Solución al problema de cierre: Prevenir que WebXR intente 
        // usar el passthrough de hardware si no está disponible.
        const scene = document.querySelector('a-scene');
        scene.addEventListener('enter-vr', () => {
            console.log("Entrando en modo VR...");
            // Si el video se pausa al entrar en VR, lo forzamos a seguir
            setTimeout(() => { video.play(); }, 500);
        });
    </script>
</body>
</html>
